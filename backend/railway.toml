[build]
builder = "nixpacks"
buildCommand = "pip install -r requirements.txt"

[deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1 --ws-ping-interval 20 --ws-ping-timeout 30 --timeout-keep-alive 30"
healthcheckPath = "/health"
healthcheckTimeout = 10
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[service]
internalPort = 8000

[[mounts]]
source = "models"
mountPath = "/app/models"
